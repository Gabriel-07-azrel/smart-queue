<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
body { background: #f4f7fb; padding: 30px; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
.counter { background: #1e88e5; color: white; padding: 10px 20px; border-radius: 30px; }

.section { background: white; padding: 25px; border-radius: 16px; margin-bottom: 25px; }

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-right: 10px;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}

.add { background: #1e88e5; color: white; }
.cancel { background: #ffebee; color: #e53935; }
.complete { background: #e8f5e9; color: #2e7d32; }

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

th { background: #f1f3f6; }
</style>
</head>

<body>

<div class="header">
    <h1>Business Queue Dashboard</h1>
    <div class="counter" id="totalCount">Total: 0</div>
</div>

<div class="section">
    <input type="text" id="searchInput" placeholder="Search...">
    <select id="searchType">
        <option value="name">Name</option>
        <option value="token">Token</option>
    </select>
    <button onclick="searchQueue()">Search</button>
    <button onclick="renderQueue()">Reset</button>
</div>

<div class="section">
    <h3>Queue Settings</h3><br>
    <input type="number" id="gapInput" placeholder="Gap (minutes)">
    <button onclick="setGap()">Set Gap</button>
    <button onclick="startTimer()">Start Timer</button>
</div>

<div class="section">
    <h3>Add Booking</h3><br>
    <input type="text" id="pName" placeholder="Customer Name">
    <input type="number" id="pAge" placeholder="Age">
    <button class="add" onclick="addPhysical()">Add</button>
</div>

<div class="section">
    <h3>Current Queue</h3>
    <table>
        <thead>
        <tr>
            <th>Token</th>
            <th>Name</th>
            <th>Age</th>
            <th>Method</th>
            <th>Timer</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="queueBody"></tbody>
    </table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDoR1prWqpE5NwAAAIkHIeac3W2Ry5DiTU",
  authDomain: "smart-queue-d7fe5.firebaseapp.com",
  databaseURL: "https://smart-queue-d7fe5-default-rtdb.firebaseio.com",
  projectId: "smart-queue-d7fe5",
  storageBucket: "smart-queue-d7fe5.firebasestorage.app",
  messagingSenderId: "393220256164",
  appId: "1:393220256164:web:a2e3edfcd698851a0ed131"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const queueRef = db.ref("queues/kadai");
const metaRef = db.ref("queues/kadai_meta");

let queue = [];
let gapTime = 5;
let startTime = null;

/* LIVE QUEUE */
queueRef.on("value", snapshot => {
    const data = snapshot.val() || {};
    queue = Object.keys(data).map(id => ({ id, ...data[id] }));

    queue.sort((a, b) => (a.token || 0) - (b.token || 0));
    syncTokens();

    // RESET TIMER IF EMPTY
    if (queue.length === 0) {
        startTime = null;
        metaRef.remove();
    }

    renderQueue();
});

/* TIMER SYNC */
metaRef.on("value", snapshot => {
    const data = snapshot.val();
    if (data) {
        startTime = data.startTime;
        gapTime = data.gapTime;
    } else {
        startTime = null;
    }
});

/* TOKEN UPDATE */
function syncTokens() {
    queue.forEach((p, i) => {
        const nextToken = i + 1;
        if (p.token !== nextToken) {
            p.token = nextToken;
            queueRef.child(p.id).update({ token: nextToken });
        }
    });
}

/* TIMER */
function getRemainingTime(index) {
    if (!startTime) return (index + 1) * gapTime * 60;

    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    let total = (index + 1) * gapTime * 60;

    return Math.max(total - elapsed, 0);
}

/* SAFE AUTO REMOVE */
function autoRemoveFirst() {
    if (queue.length === 0) return;

    let remaining = getRemainingTime(0);

    if (remaining === 0) {
        let first = queue[0];
        if (first) {
            removeBooking(first.id);
        }
    }
}

/* RENDER */
function renderQueue() {
    const body = document.getElementById("queueBody");
    if (!body) return;

    body.innerHTML = "";

    queue.forEach((p, i) => {

        let remaining = getRemainingTime(i);

        body.innerHTML += `
        <tr>
            <td>${p.token}</td>
            <td>${p.name}</td>
            <td>${p.age}</td>
            <td>${p.method}</td>
            <td>${formatTime(remaining)}</td>
            <td>${i === 0 ? "next" : "waiting"}</td>
            <td>
                <button class="cancel" onclick="cancelBooking('${p.id}')">Cancel</button>
                <button class="complete" onclick="completeBooking('${p.id}')">Complete</button>
            </td>
        </tr>`;
    });

    document.getElementById("totalCount").innerText = "Total: " + queue.length;
}

/* ADD */
function addPhysical() {
    const name = document.getElementById("pName").value;
    const age = document.getElementById("pAge").value;

    if (!name || !age) return;

    queueRef.push({
        name,
        age,
        method: "Physical",
        token: queue.length + 1,
        time: Date.now()
    });
}

/* REMOVE */
function cancelBooking(id) {
    removeBooking(id);
}

function completeBooking(id) {
    removeBooking(id);
}

function removeBooking(id) {
    const removedIndex = queue.findIndex(p => p.id === id);
    if (removedIndex === -1) return;

    queue = queue.filter(p => p.id !== id);
    queue.forEach((p, i) => {
        p.token = i + 1;
    });
    renderQueue();

    queueRef.child(id).remove().then(() => {
        const remainingCount = queue.length;

        if (remainingCount <= 0) {
            metaRef.remove();
            return;
        }

        if (removedIndex === 0) {
            metaRef.set({
                startTime: Date.now(),
                gapTime: gapTime
            });
        }
    });
}

/* SETTINGS */
function setGap() {
    const val = document.getElementById("gapInput").value;
    if (val > 0) gapTime = parseInt(val);
}

/* START TIMER */
function startTimer() {
    if (queue.length === 0) {
        alert("No customers in queue");
        return;
    }

    metaRef.set({
        startTime: Date.now(),
        gapTime: gapTime
    });
}

/* FORMAT */
function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    return `${m}:${s < 10 ? '0' : ''}${s}`;
}

/* LOOP */
setInterval(() => {
    autoRemoveFirst();
    renderQueue();
}, 1000);

</script>

</body>
</html>
