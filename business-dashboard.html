<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Business Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4f7fb;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .counter {
            background: #1e88e5;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-right: 10px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .add { background: #1e88e5; color: white; }
        .cancel { background: #ffebee; color: #e53935; }
        .complete { background: #e8f5e9; color: #2e7d32; }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        th { background: #f1f3f6; }
    </style>
</head>

<body>

<div class="header">
    <h1>Business Queue Dashboard</h1>
    <div class="counter" id="totalCount">Total: 0</div>
</div>

<div class="section">
    <input type="text" id="searchInput" placeholder="Search...">
    <select id="searchType">
        <option value="name">Name</option>
        <option value="token">Token</option>
    </select>
    <button onclick="searchQueue()">Search</button>
    <button onclick="renderQueue()">Reset</button>
</div>

<div class="section">
    <h3>Queue Settings</h3><br>
    <input type="number" id="gapInput" placeholder="Gap (minutes)">
    <button onclick="setGap()">Set Gap</button>
    <button onclick="startTimer()">Start Timer</button>
</div>

<div class="section">
    <h3>Add Booking</h3><br>
    <input type="text" id="pName" placeholder="Customer Name">
    <input type="number" id="pAge" placeholder="Age">
    <button class="add" onclick="addPhysical()">Add</button>
</div>

<div class="section">
    <h3>Current Queue</h3>
    <table>
        <thead>
        <tr>
            <th>Token</th>
            <th>Name</th>
            <th>Age</th>
            <th>Method</th>
            <th>Timer</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="queueBody"></tbody>
    </table>
</div>

<script>

let queue = JSON.parse(localStorage.getItem("queue")) || [];
let gapTime = 5;
let timerStarted = false;
let startTime = null;
let interval = null;

function saveQueue() {
    localStorage.setItem("queue", JSON.stringify(queue));
}

function updateTokens() {
    queue.forEach((p, i) => p.token = i + 1);
}

function getRemainingTime(index) {
    if (!timerStarted) return (index + 1) * gapTime * 60;

    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    let total = (index + 1) * gapTime * 60;

    return Math.max(total - elapsed, 0);
}

function renderQueue() {
    updateTokens();
    saveQueue();

    const body = document.getElementById("queueBody");
    body.innerHTML = "";

    queue.forEach((p, i) => {
        body.innerHTML += `
        <tr>
            <td>${p.token}</td>
            <td>${p.name}</td>
            <td>${p.age}</td>
            <td>${p.method}</td>
            <td>${formatTime(getRemainingTime(i))}</td>
            <td>${p.status}</td>
            <td>
                <button class="cancel" onclick="cancelBooking(${i})">Cancel</button>
                <button class="complete" onclick="completeBooking(${i})">Complete</button>
            </td>
        </tr>`;
    });

    document.getElementById("totalCount").innerText = "Total: " + queue.length;
}

function addPhysical() {
    const name = document.getElementById("pName").value;
    const age = document.getElementById("pAge").value;

    if (!name || !age) return;

    queue.push({
        name,
        age,
        method: "Physical",
        status: "waiting"
    });

    renderQueue();
}

function cancelBooking(i) {
    queue.splice(i, 1);
    renderQueue();
}

function completeBooking(i) {
    queue.splice(i, 1);
    renderQueue();
}

function setGap() {
    const val = document.getElementById("gapInput").value;
    if (val > 0) {
        gapTime = parseInt(val);
        renderQueue();
    }
}

function startTimer() {
    if (timerStarted) return;
    timerStarted = true;
    startTime = Date.now();

    interval = setInterval(() => {
        renderQueue();
    }, 1000);
}

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function searchQueue() {
    const val = document.getElementById("searchInput").value.toLowerCase();
    const type = document.getElementById("searchType").value;

    const filtered = queue.filter(p =>
        type === "name"
            ? p.name.toLowerCase().includes(val)
            : String(p.token).includes(val)
    );

    const body = document.getElementById("queueBody");
    body.innerHTML = "";

    filtered.forEach((p, i) => {
        body.innerHTML += `
        <tr>
            <td>${p.token}</td>
            <td>${p.name}</td>
            <td>${p.age}</td>
            <td>${p.method}</td>
            <td>${formatTime(getRemainingTime(i))}</td>
            <td>${p.status}</td>
            <td></td>
        </tr>`;
    });
}

renderQueue();

</script>

</body>
</html>
