<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Queue Companion</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Floating dots background */
        .dots {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#1e88e5 1px, transparent 1px),
                radial-gradient(#e53935 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            opacity: 0.15;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            from {
                background-position: 0 0, 20px 20px;
            }

            to {
                background-position: 100px 200px, 120px 220px;
            }
        }

        .container {
            position: relative;
            text-align: center;
            max-width: 700px;
            padding: 40px;
            z-index: 1;
        }

        .logo {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .logo span {
            background: linear-gradient(90deg, #1e88e5, #e53935);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 22px;
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        button {
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            background: #1e88e5;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        button:hover {
            background: #1565c0;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="dots"></div>

    <div class="container">
        <div class="logo">
            Smart <span>Queue</span> Companion
        </div>

        <h2>
            A Design Thinking Based<br>
            Smart Queue Management System
        </h2>

        <p>
            You have successfully entered a smarter way of waiting.<br>
            Join queues digitally, track your turn in real time,<br>
            and receive notifications before your turn arrives.
        </p>

        <button onclick="location.href='login.html'">
            Get Started
        </button>

        <div class="footer">
            Designed for clinics • shops • banks • restaurants
        </div>
    </div>

</body>

</html>
