<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Smart Queue Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Sora', sans-serif;
            background: #0b1a3b;
            color: white;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: url('https://c8.alamy.com/comp/1990478519/mix-race-people-standing-in-queue-line-waiting-for-service-man-holding-smartphone-with-qr-code-and-number-on-screen-digital-queue-management-system-1990478519.jpg') center / cover no-repeat;
            filter: brightness(0.22) saturate(0.5);
            z-index: 0;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(11,26,59,0.94) 0%, rgba(30,60,120,0.65) 100%);
            z-index: 1;
        }

        /* HEADER */
        .header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 20px 48px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            background: rgba(11,26,59,0.6);
            gap: 10px;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: rgba(255,255,255,0.13);
            border: 1px solid rgba(255,255,255,0.22);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-name {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: white;
        }

        .brand-name span { color: #7eb8f7; }

        .brand-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            font-weight: 300;
            margin-left: 2px;
        }

        .add-btn {
            margin-left: auto;
            padding: 10px 20px;
            background: #7eb8f7;
            color: #0b1a3b;
            border: none;
            border-radius: 10px;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            letter-spacing: 0.02em;
        }

        .add-btn:hover { opacity: 0.88; }
        .add-btn:active { transform: scale(0.98); }

        /* CONTENT */
        .content {
            position: relative;
            z-index: 2;
            padding: 44px 48px;
        }

        .content-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .divider {
            width: 36px;
            height: 2px;
            background: #7eb8f7;
            border-radius: 2px;
            margin-bottom: 10px;
        }

        .content-header h2 {
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .content-header p {
            font-size: 13px;
            color: rgba(255,255,255,0.38);
            font-weight: 300;
        }

        .biz-count {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 100px;
        }

        .biz-count span { color: #7eb8f7; }

        /* GRID */
        .business-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(255,255,255,0.14);
            padding: 1.8rem;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            cursor: pointer;
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
            animation: fadeUp 0.5s ease both;
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255,255,255,0.13);
            border-color: rgba(126,184,247,0.4);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .biz-icon {
            width: 44px;
            height: 44px;
            background: rgba(126,184,247,0.12);
            border: 1px solid rgba(126,184,247,0.2);
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            color: #5ed6c3;
            background: rgba(94,214,195,0.1);
            border: 1px solid rgba(94,214,195,0.18);
            padding: 5px 11px;
            border-radius: 100px;
            letter-spacing: 0.04em;
        }

        .card h3 {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .card-hint {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            font-weight: 300;
        }

        .delete-btn {
            padding: 6px 13px;
            background: rgba(255,100,100,0.08);
            border: 1px solid rgba(255,100,100,0.18);
            color: rgba(255,120,120,0.85);
            font-size: 11px;
            font-weight: 600;
            font-family: 'Sora', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .delete-btn:hover {
            background: rgba(255,100,100,0.15);
            border-color: rgba(255,100,100,0.3);
        }

        /* EMPTY */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.3);
        }

        .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.5; }
        .empty-state h3 { font-size: 20px; color: white; margin-bottom: 8px; font-weight: 500; }
        .empty-state p { font-size: 13px; font-weight: 300; }

        .footer-note {
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            position: relative;
            z-index: 2;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header { padding: 14px 16px; gap: 8px; }
            .content { padding: 20px 16px; }
            .add-btn { padding: 9px 14px; font-size: 12px; }
            .content-header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .content-header h2 { font-size: 22px; }
            .business-list { grid-template-columns: 1fr; gap: 14px; }
            .card { padding: 1.3rem; }
            .card h3 { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="bg-overlay"></div>

    <div class="header">
        <div class="brand-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                <path d="M14 17h3v3"/><path d="M17 14h3"/>
            </svg>
        </div>
        <div>
            <div class="brand-name">Smart<span>Queue</span></div>
            <div class="brand-sub">Admin Portal</div>
        </div>
        <button class="add-btn" onclick="location.href='admin-details.html'">+ Add Business</button>
    </div>

    <div class="content">
        <div class="content-header">
            <div>
                <div class="divider"></div>
                <h2>Your Businesses</h2>
                <p>Manage and monitor all registered businesses</p>
            </div>
            <div class="biz-count">Total: <span id="bizCountNum">0</span></div>
        </div>
        <div class="business-list" id="businessList"></div>
    </div>

    <p class="footer-note">Smart Queue Companion &mdash; Powered by QueueFlow</p>

    <script>
        const typeIcons = { Clinic: '🏥', Shop: '🛍️', Bank: '🏦', Restaurant: '🍽️' };

        const businessListEl = document.getElementById("businessList");
        let businesses = JSON.parse(localStorage.getItem("businesses")) || [];

        function renderBusinesses() {
            businessListEl.innerHTML = "";
            document.getElementById("bizCountNum").innerText = businesses.length;

            if (businesses.length === 0) {
                window.location.href = "role.html";
                return;
            }

            businesses.forEach((biz, index) => {
                const card = document.createElement("div");
                card.className = "card";
                card.style.animationDelay = (index * 0.08) + "s";

                card.innerHTML = `
                    <div class="card-top">
                        <div class="biz-icon">${typeIcons[biz.type] || '🏢'}</div>
                        <div class="type-badge">${biz.type}</div>
                    </div>
                    <h3>${biz.name}</h3>
                    <div class="card-footer">
                        <span class="card-hint">Click to open dashboard</span>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteBusiness(${index})">Delete</button>
                    </div>
                `;

                card.onclick = function () {
                    localStorage.setItem("activeBusinessId", biz.id);
                    window.location.href = "business-dashboard.html";
                };

                businessListEl.appendChild(card);
            });
        }

        function deleteBusiness(index) {
            const confirmDelete = confirm("Are you sure you want to delete this business?");
            if (!confirmDelete) return;

            localStorage.removeItem("queue_" + businesses[index].id);
            localStorage.removeItem("qr_" + businesses[index].id);

            businesses.splice(index, 1);
            localStorage.setItem("businesses", JSON.stringify(businesses));
            renderBusinesses();
        }

        renderBusinesses();
    </script>
</body>
</html>
