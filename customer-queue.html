<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Queue Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4f7fb;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: #1e88e5;
            color: white;
            cursor: pointer;
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }

        input {
            padding: 8px;
            margin-right: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .cancel {
            background: #ffebee;
            color: #e53935;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Queue Status</h1>
        <button onclick="showQR()">Show QR</button>
    </div>

    <div class="section">
        <h3>Book Token (Max 3)</h3><br>
        <input id="name" placeholder="Your Name">
        <input id="age" type="number" placeholder="Age">
        <button onclick="book()">Book</button>
    </div>

    <div class="section">
        <h3>Current Queue</h3>
        <table>
            <thead>
                <tr>
                    <th>Token</th>
                    <th>Name</th>
                    <th>Method</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="queueBody"></tbody>
        </table>
    </div>

    <div class="modal" id="qrModal">
        <div class="modal-content">
            <div id="qrImage"></div><br>
            <button onclick="closeQR()">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

    <script>

        // Get business ID
        const params = new URLSearchParams(window.location.search);
        let businessId = params.get("business") || localStorage.getItem("customerBusinessId");

        if (!businessId) {
            document.body.innerHTML = "<h2 style='padding:40px'>No business selected.</h2>";
        }

        localStorage.setItem("customerBusinessId", businessId);

        // Load queue
        let queue = JSON.parse(localStorage.getItem("queue_" + businessId)) || [];

        function saveQueue() {
            localStorage.setItem("queue_" + businessId, JSON.stringify(queue));
        }

        function updateTokens() {
            queue.forEach((person, index) => {
                person.token = index + 1;
            });
        }

        function render() {
            updateTokens();
            saveQueue();

            const body = document.getElementById("queueBody");
            body.innerHTML = "";

            queue.forEach((p, index) => {
                body.innerHTML += `
            <tr>
                <td>${p.token}</td>
                <td>${p.name}</td>
                <td>${p.method}</td>
                <td>
                    ${p.method === "Online"
                        ? `<button class="cancel" onclick="cancelBooking(${index})">Cancel</button>`
                        : ``}
                </td>
            </tr>
        `;
            });
        }

        function book() {

            const onlineCount = queue.filter(p => p.method === "Online").length;

            if (onlineCount >= 3) {
                alert("Maximum number of tokens reached for online bookings.");
                return;
            }

            const name = document.getElementById("name").value;
            const age = document.getElementById("age").value;

            if (!name || !age) return;

            queue.push({
                name,
                age,
                method: "Online"
            });

            render();
        }

        function cancelBooking(index) {
            queue.splice(index, 1);
            render();
        }

        function showQR() {
            document.getElementById("qrModal").style.display = "flex";
            document.getElementById("qrImage").innerHTML = "";

            new QRCode("qrImage", {
                text: window.location.href,
                width: 200,
                height: 200
            });
        }

        function closeQR() {
            document.getElementById("qrModal").style.display = "none";
        }

        render();

    </script>

</body>

</html>
