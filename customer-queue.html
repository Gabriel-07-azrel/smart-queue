<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Queue Status</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f4f7fb;
            padding: 40px;
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-right: 10px;
        }

        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #1e88e5;
            color: white;
            cursor: pointer;
        }

        .cancel {
            background: #ffebee;
            color: #e53935;
        }

        .highlight {
            background: #e3f2fd;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Queue Status</h1>

<div class="section">
    <h3>Book Token (Max 3)</h3><br>
    <input id="name" placeholder="Your Name">
    <input id="age" type="number" placeholder="Age">
    <button onclick="book()">Book</button>
</div>

<div class="section">
    <h3>Your Status</h3>
    <p id="myStatus">Not booked</p>
</div>

<div class="section">
    <h3>Current Queue</h3>
    <table width="100%">
        <thead>
            <tr>
                <th>Token</th>
                <th>Name</th>
                <th>Status</th>
                <th>Timer</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="queueBody"></tbody>
    </table>
</div>

<script>

let queue = JSON.parse(localStorage.getItem("queue")) || [];
let myBookings = JSON.parse(localStorage.getItem("myBookings")) || [];
let gapTime = 5;
let startTime = null;

// TOKEN UPDATE
function updateTokens() {
    queue.forEach((p, i) => {
        p.token = i + 1;
        p.status = i === 0 ? "next" : "waiting";
    });
}

// TIMER LOGIC (same as admin)
function getRemainingTime(index) {
    if (!startTime) return (index + 1) * gapTime * 60;

    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    let total = (index + 1) * gapTime * 60;

    return Math.max(total - elapsed, 0);
}

// FORMAT TIME
function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    return `${m}:${s < 10 ? '0' : ''}${s}`;
}

// RENDER
function render() {
    updateTokens();
    localStorage.setItem("queue", JSON.stringify(queue));

    const body = document.getElementById("queueBody");
    body.innerHTML = "";

    queue.forEach((p, i) => {

        let isMine = myBookings.includes(p.name);

        body.innerHTML += `
        <tr class="${isMine ? 'highlight' : ''}">
            <td>${p.token}</td>
            <td>${p.name}</td>
            <td>${p.status}</td>
            <td>${formatTime(getRemainingTime(i))}</td>
            <td>
                ${isMine ? `<button class="cancel" onclick="cancelBooking(${i})">Cancel</button>` : ""}
            </td>
        </tr>`;
    });

    updateMyStatus();
}

// BOOKING
function book() {

    if (myBookings.length >= 3) {
        alert("Max 3 bookings allowed");
        return;
    }

    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;

    if (!name || !age) return;

    queue.push({
        name,
        age,
        method: "Online",
        status: "waiting"
    });

    myBookings.push(name);

    localStorage.setItem("myBookings", JSON.stringify(myBookings));

    render();
}

// CANCEL
function cancelBooking(i) {
    myBookings = myBookings.filter(n => n !== queue[i].name);
    localStorage.setItem("myBookings", JSON.stringify(myBookings));

    queue.splice(i, 1);
    render();
}

// SHOW USER STATUS
function updateMyStatus() {
    const my = queue.find(p => myBookings.includes(p.name));

    if (!my) {
        document.getElementById("myStatus").innerText = "Not booked";
        return;
    }

    document.getElementById("myStatus").innerText =
        `Token ${my.token} | Status: ${my.status}`;
}

// AUTO REFRESH TIMER
setInterval(render, 1000);

render();

</script>

</body>
</html>
