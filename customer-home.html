<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Portal | Smart Queue Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Sora', sans-serif;
            background: #0b1a3b;
            color: white;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: url('https://c8.alamy.com/comp/1990478519/mix-race-people-standing-in-queue-line-waiting-for-service-man-holding-smartphone-with-qr-code-and-number-on-screen-digital-queue-management-system-1990478519.jpg') center / cover no-repeat;
            filter: brightness(0.22) saturate(0.5);
            z-index: 0;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(11,26,59,0.94) 0%, rgba(30,60,120,0.65) 100%);
            z-index: 1;
        }

        /* HEADER */
        .header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 20px 48px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            background: rgba(11,26,59,0.6);
            gap: 10px;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: rgba(255,255,255,0.13);
            border: 1px solid rgba(255,255,255,0.22);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-name {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: white;
        }

        .brand-name span { color: #7eb8f7; }

        .brand-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            font-weight: 300;
            margin-left: 2px;
        }

        /* CONTENT */
        .content {
            position: relative;
            z-index: 2;
            padding: 44px 48px;
        }

        .page-intro {
            margin-bottom: 36px;
            animation: fadeUp 0.7s cubic-bezier(.22,.68,0,1.2) both;
        }

        .divider {
            width: 36px;
            height: 2px;
            background: #5ed6c3;
            border-radius: 2px;
            margin-bottom: 10px;
        }

        .page-tag {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            font-weight: 500;
            color: #5ed6c3;
            background: rgba(94,214,195,0.1);
            border: 1px solid rgba(94,214,195,0.2);
            padding: 5px 13px;
            border-radius: 100px;
            margin-bottom: 14px;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        .page-tag::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #5ed6c3;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .page-intro h1 {
            font-size: 30px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .page-intro p {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            font-weight: 300;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }

        .card {
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(255,255,255,0.14);
            padding: 1.8rem;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: fadeUp 0.5s ease both;
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255,255,255,0.13);
            border-color: rgba(94,214,195,0.4);
        }

        .card-icon {
            width: 46px;
            height: 46px;
            background: rgba(94,214,195,0.12);
            border: 1px solid rgba(94,214,195,0.2);
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .card-type {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            font-weight: 300;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .queue-info {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            font-weight: 300;
        }

        .queue-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #5ed6c3;
            animation: pulse 2s infinite;
        }

        .card-arrow {
            font-size: 16px;
            color: rgba(255,255,255,0.25);
            transition: transform 0.2s, color 0.2s;
        }

        .card:hover .card-arrow { transform: translateX(4px); color: #5ed6c3; }

        /* EMPTY */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.3);
        }

        .empty-icon { font-size: 44px; opacity: 0.5; margin-bottom: 14px; }
        .empty h3 { font-size: 20px; font-weight: 500; color: white; margin-bottom: 8px; }
        .empty p { font-size: 13px; font-weight: 300; }

        .footer-note {
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            position: relative;
            z-index: 2;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header { padding: 18px 24px; }
            .content { padding: 28px 24px; }
            .page-intro h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="bg-overlay"></div>

    <div class="header">
        <div class="brand-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                <path d="M14 17h3v3"/><path d="M17 14h3"/>
            </svg>
        </div>
        <div>
            <div class="brand-name">Smart<span>Queue</span></div>
            <div class="brand-sub">Skip the wait · Join from anywhere</div>
        </div>
    </div>

    <div class="content">
        <div class="page-intro">
            <div class="page-tag">Customer Portal</div>
            <div class="divider"></div>
            <h1>Select a Business</h1>
            <p>Choose where you'd like to join the queue today</p>
        </div>

        <div class="grid" id="businessGrid"></div>
    </div>

    <p class="footer-note">Smart Queue Companion &mdash; Powered by QueueFlow</p>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const typeIcons = { Clinic: '🏥', Shop: '🛍️', Bank: '🏦', Restaurant: '🍽️' };

        const firebaseConfig = {
            apiKey: "AIzaSyDoR1prWqpE5NwAAAIkHIeac3W2Ry5DiTU",
            authDomain: "smart-queue-d7fe5.firebaseapp.com",
            databaseURL: "https://smart-queue-d7fe5-default-rtdb.firebaseio.com",
            projectId: "smart-queue-d7fe5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const db = firebase.database();
        const queueRef = db.ref("queues/kadai");
        const businesses = JSON.parse(localStorage.getItem("businesses")) || [];
        const grid = document.getElementById("businessGrid");

        if (businesses.length === 0) {
            grid.innerHTML = `<div class="empty">
                <div class="empty-icon">🏢</div>
                <h3>No businesses available</h3>
                <p>Ask an admin to register a business first</p>
            </div>`;
        }

        function renderBusinesses(queueCount) {
            if (businesses.length === 0) return;
            grid.innerHTML = "";

            businesses.forEach((biz, i) => {
                const card = document.createElement("div");
                card.className = "card";
                card.style.animationDelay = (i * 0.08) + "s";
                card.innerHTML = `
                    <div class="card-icon">${typeIcons[biz.type] || '🏢'}</div>
                    <h3>${biz.name}</h3>
                    <div class="card-type">${biz.type}</div>
                    <div class="card-footer">
                        <div class="queue-info">
                            <div class="queue-dot"></div>
                            ${queueCount} ${queueCount === 1 ? 'person' : 'people'} in queue
                        </div>
                        <span class="card-arrow">→</span>
                    </div>
                `;
                card.onclick = () => openQueue(biz.id);
                grid.appendChild(card);
            });
        }

        queueRef.on("value", snapshot => {
            const data = snapshot.val() || {};
            renderBusinesses(Object.keys(data).length);
        });

        function openQueue(id) {
            localStorage.setItem("customerBusinessId", id);
            window.location.href = "customer-queue.html";
        }
    </script>
</body>
</html>
