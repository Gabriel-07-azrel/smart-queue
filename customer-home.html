<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Customer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4f7fb;
            padding: 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .queue-info {
            margin-top: 12px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>

    <h1>Select Business</h1>

    <div class="grid" id="businessGrid"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>

        const firebaseConfig = {
            apiKey: "AIzaSyDoR1prWqpE5NwAAAIkHIeac3W2Ry5DiTU",
            authDomain: "smart-queue-d7fe5.firebaseapp.com",
            databaseURL: "https://smart-queue-d7fe5-default-rtdb.firebaseio.com",
            projectId: "smart-queue-d7fe5"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.database();
        const queueRef = db.ref("queues/kadai");

        const businesses = JSON.parse(localStorage.getItem("businesses")) || [];
        const grid = document.getElementById("businessGrid");

        if (businesses.length === 0) {
            grid.innerHTML = "<p>No businesses available.</p>";
        }

        function renderBusinesses(queueCount) {
            if (businesses.length === 0) return;

            grid.innerHTML = "";

            businesses.forEach(biz => {
                grid.innerHTML += `
            <div class="card" onclick="openQueue('${biz.id}')">
                <h3>${biz.name}</h3>
                <p>${biz.type}</p>
                <div class="queue-info">
                    People in Queue: ${queueCount}
                </div>
            </div>
        `;
            });
        }

        queueRef.on("value", snapshot => {
            const data = snapshot.val() || {};
            renderBusinesses(Object.keys(data).length);
        });

        function openQueue(id) {
            localStorage.setItem("customerBusinessId", id);
            window.location.href = "customer-queue.html";
        }

    </script>

</body>

</html>
